{% extends "base.html" %}

{% block content %}

<section class="typing-page">

    <div class="top-section">

        <h1>
            CodeType AI
        </h1>

        <div class="stats-container">

            <div class="stat-box">
                <span>Time</span>
                <h2 id="timer">60</h2>
            </div>

            <div class="stat-box">
                <span>WPM</span>
                <h2 id="wpm">0</h2>
            </div>

            <div class="stat-box">
                <span>Accuracy</span>
                <h2 id="accuracy">100%</h2>
            </div>

            <div class="stat-box">
                <span>Errors</span>
                <h2 id="errors">0</h2>
            </div>

        </div>

    </div>

    <div class="typing-container">

        <pre id="code-display"></pre>

        <input
            type="text"
            id="hidden-input"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
        >

    </div>
    <div class="button-controls">
        <button id="restart-btn"> Restart Test</button>
        <p id="status-message"></p>
    </div>

</section>

<script src="{{ url_for('static', filename='js/typing-engine.js') }}"></script>

{% endblock %}
